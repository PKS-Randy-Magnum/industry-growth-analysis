# Industry selection and plot filters

exclude:
  - government
  - gross domestic product  # aggregate, not a sector

# Do not plot real-estate subcomponents separately; use the combined FIRE aggregate.
exclude_subsectors:
  - real estate
  - rental and leasing services and lessors of intangible assets

# Top-level private sectors for Plot 1 (bold-face). Manufacturing is split below.
sector_plot:
  - Agriculture, forestry, fishing, and hunting
  - Mining
  - Utilities
  - Construction
  - Durable goods
  - Nondurable goods
  - Wholesale trade
  - Retail trade
  - Transportation and warehousing
  - Information
  - "Finance, insurance, real estate, rental, and leasing"
  - Professional and business services
  - "Educational services, health care, and social assistance"
  - "Arts, entertainment, recreation, accommodation, and food services"
  - "Other services, except government"

# Subsector plot: children of major sectors (manufacturing already split).
subsector_plot_parent_min_indent: 8
subsector_plot_max_indent: 12

# Default plot/analysis window (runtime CLI --start/--end overrides in run.py).
bea_period:
  start: "2019-Q1"
  end: "2026-Q2"

trust_funds:
  line_id: 59
  industry_name: "Funds, trusts, and other financial vehicles"

default_plot_profile: excl_trust_funds

regime_thresholds:
  price_led_min_price_growth: 0.005
  quantity_led_min_quantity_growth: 0.005

# Exclude Q/P rankings when |price_growth| is below this (unstable ratio).
qp_unstable_price_threshold: 0.005

event_periods:
  covid_shock:
    start: "2020-Q1"
    end: "2020-Q2"
  recovery:
    start: "2021-Q1"
    end: "2022-Q4"
  tariffs:
    start: "2025-Q1"
    end: null

bls_period:
  start: "2019-01"
  end: "2026-06"

forecast:
  frequency: annual_q1
  through: "2027-Q1"
  confidence_level: 0.80
  min_obs_annual: 6
  sarima_order: [1, 0, 1]
  sarima_seasonal_order: [0, 0, 0, 0]
  shock_presets:
    low_inflation_pp: -2
    high_inflation_pp: 2
    severe_inflation_pp: 5
    mild_tariff_pp: 0.5
    severe_tariff_pp: 2
    sector_tariff_pp: 2
